      [...el.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');
      state[key]=b.dataset.v; if(key==='coord') syncFarms(); render();
    });
  }
  build(document.getElementById('f-coord'), coords, 'coord');
  build(document.getElementById('f-status'), statuses, 'status');

  const farmSel=document.getElementById('f-farm');
  function syncFarms(){
    const avail = state.coord==='all'? farms : [...new Set(DS.filter(r=>r.coord===state.coord).map(r=>r.fazenda))].sort((a,b)=>a.localeCompare(b,'pt'));
    if(state.farm!=='all' && !avail.includes(state.farm)) state.farm='all';
    farmSel.innerHTML='<option value="all">Todas as fazendas</option>'+avail.map(v=>`<option value="${v}">${v}</option>`).join('');
    farmSel.value=state.farm;
  }
  syncFarms();
  farmSel.addEventListener('change', ()=>{ state.farm=farmSel.value; render(); });

  document.getElementById('btn-reset').addEventListener('click', ()=>{
    state={coord:'all',status:'all',farm:'all'};
    document.querySelectorAll('#f-coord .pill, #f-status .pill').forEach(p=>p.classList.toggle('on', p.dataset.v==='all'));
    syncFarms(); render();
  });

  function filtered(){
    return DS.filter(r=>
      (state.coord==='all'||r.coord===state.coord) &&
      (state.status==='all'||r.aprovacao===state.status) &&
      (state.farm==='all'||r.fazenda===state.farm)
    );
  }

  // ---- aggregation helpers ----
  const sum = (arr,f)=>arr.reduce((s,r)=>s+(isNum(f(r))?f(r):0),0);
  const countBy = (arr,f)=>{ const m={}; arr.forEach(r=>{const k=f(r); m[k]=(m[k]||0)+1;}); return m; };
  const areaBy  = (arr,f)=>{ const m={}; arr.forEach(r=>{ if(isNum(r.area)){const k=f(r); m[k]=(m[k]||0)+r.area;} }); return m; };
  const mean = (arr,f)=>{ const v=arr.map(f).filter(isNum); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; };

  // ---- KPI cards ----
  function kpiCards(rows){
    const total=rows.length;
    const area=sum(rows,r=>r.area);
    const nFarm=new Set(rows.map(r=>r.fazenda)).size;
    const nCoord=new Set(rows.map(r=>r.coord)).size;
    const idade=mean(rows,r=>r.idade);
    const apr=rows.filter(r=>r.aprovacao==='Aprovado'), rep=rows.filter(r=>r.aprovacao==='Reprovado'), pend=rows.filter(r=>r.aprovacao==='Não Avaliado');
    const aprA=sum(apr,r=>r.area), repA=sum(rep,r=>r.area);
    const standM=mean(rows,r=>r.stand), cvM=mean(rows,r=>r.cv);
    const nStand=rows.filter(r=>isNum(r.stand)).length, nCv=rows.filter(r=>isNum(r.cv)).length;
    const pct=(n)=> total? f1.format(100*n/total)+'%' : '—';
    const cards=[
      {label:'Fazendas', ic:'farm', val:fmtInt(nFarm), sub:`${fmtInt(total)} talhões`},
      {label:'Talhões', ic:'grid', val:fmtInt(total), sub: idade!=null? `idade média ${Math.round(idade)} dias`:'—'},
      {label:'Área total', ic:'ha', val:fmtHa(area), u:'ha', sub:`${nCoord} coordenaç${nCoord>1?'ões':'ão'}`},
      {label:'Stand médio', ic:'plant', val: standM!=null? fmtInt(standM):'—', u:'pl/ha', sub:`${fmtInt(nStand)} talhões medidos`},
      {label:'CV% médio', ic:'cv', val: cvM!=null? f1.format(cvM*100):'—', u:'%', sub:`${fmtInt(nCv)} talhões com CV`},
    ];
    const ic={grid:'▦',ha:'▤',farm:'⌂',ok:'✓',no:'✕',wait:'◷',plant:'⑂',cv:'∿'};
    document.getElementById('kpi-grid').innerHTML = cards.map(c=>`
      <div class="kpi ${c.cls||''}">
        <div class="k-top"><span class="k-label">${c.label}</span><span class="k-ic num">${ic[c.ic]}</span></div>
        <div class="k-val num">${c.val}${c.u?`<span class="u">${c.u}</span>`:''}</div>
        <div class="k-sub">${c.sub}</div>
      </div>`).join('');
    const fr=(n)=> total? (100*n/total):0;
    const stats=[
      {cls:'pos', ic:'✓', label:'Aprovados', val:apr.length, sub:`${fmtHa(aprA)} ha · ${pct(apr.length)}`, p:fr(apr.length)},
      {cls:'neg', ic:'✕', label:'Reprovados', val:rep.length, sub:`${fmtHa(repA)} ha · ${pct(rep.length)}`, p:fr(rep.length)},
      {cls:'neu', ic:'◷', label:'Pendentes', val:pend.length, sub:`${pct(pend.length)} do total`, p:fr(pend.length)},
    ];
    document.getElementById('status-grid').innerHTML = stats.map(s=>`
      <div class="stat stat-${s.cls}">
        <div class="stat-top"><span class="stat-ic num">${s.ic}</span><span class="stat-label">${s.label}</span></div>
        <div class="stat-val num">${fmtInt(s.val)}</div>
        <div class="stat-sub">${s.sub}</div>
        <div class="stat-barrow"><div class="stat-track"><div class="stat-fill" style="width:${Math.max(0,Math.min(100,s.p)).toFixed(1)}%"></div></div><span class="stat-pct num">${f1.format(s.p)}%</span></div>
      </div>`).join('');
  }

  function donut(canvasId, legendId, map, counts, centerSub){
    const labels=Object.keys(map).filter(k=>counts[k]);

    else charts[canvasId]=new Chart(document.getElementById(canvasId), {
      type:'doughnut',
      data:{ labels, datasets:[{ data, backgroundColor:colors, borderColor:'#fff', borderWidth:2 }] },
      options: donutOpts({ plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${fmtInt(c.raw)} talhões`}}, centerText:{display:true,text:fmtInt(total),sub:centerSub} } })
    });
    drawLegend(legendId, labels.map(k=>({l:k,c:map[k],v:fmtInt(counts[k])})));
  }

        plugins:{ legend:{display:false}, tooltip:{callbacks:{title:items=>items[0].label+' pl/ha', label:c=>` ${fmtHa(c.raw)} ha · ${sb[c.dataIndex].n} talhões`}},

      options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, layout:{padding:{right:44}},
        scales:{ x:{grid:{color:C.line,drawBorder:false}, ticks:{callback:v=>fmtInt(v),color:C.ink3}, title:{display:true,text:'hectares',color:C.ink3,font:{size:11}}}, y:{grid:{display:false}, ticks:{color:C.ink, font:{size:11.5}}} },
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${fmtHa(c.raw)} ha · ${fN[c.label]||0} talhões`}},

    else charts.c_farms=new Chart(document.getElementById('c_farms'), fCfg);

    // summary table
    const body=document.getElementById('tbl-body'); const cs=[...new Set(rows.map(r=>r.coord))].sort();
    body.innerHTML = cs.map(c=>{ const rs=rows.filter(r=>r.coord===c);
      const area=sum(rs,r=>r.area), st=mean(rs,r=>r.stand), cv=mean(rs,r=>r.cv);
      const ap=rs.filter(r=>r.aprovacao==='Aprovado').length, pe=rs.filter(r=>r.aprovacao==='Não Avaliado').length;
      const pePct = rs.length? Math.round(100*pe/rs.length):0;

    const tot=rows, area=sum(tot,r=>r.area), st=mean(tot,r=>r.stand), cv=mean(tot,r=>r.cv);

  /* ================= Aba "Atualizar dados" ================= */
  const $ = id => document.getElementById(id);
  const norm = s => (s==null?'':String(s)).trim();
  const stripAcc = s => norm(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const toNum = v => { if(v===''||v==null) return null; const n=Number(v); return isNaN(n)? null : n; };
  function classeCVfromCV(cv){
    if(!isNum(cv)) return 'Não Avaliado';
    if(cv<0.15) return '10 - 15%'; if(cv<0.20) return '15 - 20%'; if(cv<0.25) return '20 - 25%';
    if(cv<0.30) return '25 - 30%'; if(cv<0.35) return '30 - 35%'; if(cv<0.40) return '35 - 40%';
    return '> 40%';
  }

  // ---- workbook parsing ----
  function findHeaderRow(mat){
    for(let i=0;i<Math.min(mat.length,25);i++){
      const cells=(mat[i]||[]).map(stripAcc);
      const has=re=>cells.some(c=>re.test(c));
      if(has(/fazenda/) && (has(/coorden/)||has(/aprova/)||has(/stand/))) return i;
    }
    return -1;
  }
  function buildColMap(header){
    const H=header.map(stripAcc);
    const find=pred=>{ for(let i=0;i<H.length;i++){ if(H[i] && pred(H[i])) return i; } return -1; };
    return {
      aprovacao: find(h=>/aprova/.test(h)),
      coord:     find(h=>/coorden/.test(h)),
      fazenda:   find(h=>/fazenda/.test(h)),
      id:        find(h=>/^id\b/.test(h)),
      tl:        find(h=>/^tl$/.test(h) || (/talha|talhao/.test(h) && !/aprova/.test(h))),
      area:      find(h=>/area|área/.test(h) && !/pos|pós/.test(h)),
      area_pos:  find(h=>/area|área/.test(h) && /pos|pós/.test(h)),
      idade:     find(h=>/idade/.test(h)),
      stand:     find(h=>/stand/.test(h) && !/classe/.test(h)),
      cv:        find(h=>/cv/.test(h) && !/classe/.test(h) && !/conform/.test(h)),
      classe_stand: find(h=>/classe/.test(h) && /stand/.test(h)),
      conf_cv:   find(h=>/conform/.test(h))
    };
  }
  function parseWorkbook(file){
    return file.arrayBuffer().then(buf=>{
      const wb = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:false});
      const sheet = wb.SheetNames.find(n=>/base/i.test(n)) || wb.SheetNames[0];
      const mat = XLSX.utils.sheet_to_json(wb.Sheets[sheet], {header:1, raw:true, defval:null});
      const hr = findHeaderRow(mat);
      if(hr<0) throw new Error('Não encontrei a linha de cabeçalho (com “Fazenda” e “Coordenação”). Confira se a planilha é o Relatório de devolução.');
      const m = buildColMap(mat[hr]);
      const missing = ['aprovacao','coord','fazenda','area'].filter(k=>m[k]<0);
      if(missing.length) throw new Error('Colunas obrigatórias não localizadas: '+missing.join(', ')+'. Verifique os títulos das colunas.');
      const warnings = ['stand','cv','classe_stand','conf_cv','idade'].filter(k=>m[k]<0);
      const get=(row,k)=> m[k]>=0? row[m[k]] : null;
      const rows=[];
      for(let i=hr+1;i<mat.length;i++){
        const row=mat[i]||[];
        const faz=norm(get(row,'fazenda')), coord=norm(get(row,'coord')), apr=norm(get(row,'aprovacao'));
        if(!faz && !coord && !apr) continue;
        let cv=toNum(get(row,'cv')); if(cv!=null && cv>1) cv=cv/100;   // aceita CV em % (20,8) ou fração (0,208)
        rows.push({
          aprovacao: apr || 'Não Avaliado', id: toNum(get(row,'id')), fazenda: faz || '—',
          tl: norm(get(row,'tl')), area: toNum(get(row,'area')), area_pos: toNum(get(row,'area_pos')),
          plantio:null, idade: toNum(get(row,'idade')), aceite:null,
          stand: toNum(get(row,'stand')), cv, classe_cv: classeCVfromCV(cv),
          classe_stand: norm(get(row,'classe_stand')) || 'Não Avaliado',
          conf_cv: norm(get(row,'conf_cv')) || 'Não Avaliado',
          divulgacao:null, coord: coord || '—'
        });
      }
      if(!rows.length) throw new Error('Nenhuma linha de dados encontrada abaixo do cabeçalho.');
      return { rows, sheet, warnings };
    });
  }

  // ---- upload UI ----
  let staged=null;
  function statusBox(kind,msg){ const el=$('dz-status'); el.style.display=''; el.className='dz-status '+kind; el.innerHTML=msg; }
  function previewTable(rows){
    const cols=[['coord','Coordenação'],['fazenda','Fazenda'],['tl','TL'],['area','Área'],['idade','Idade'],['stand','Stand'],['cv','CV%'],['aprovacao','Status']];
    const head='<tr>'+cols.map(c=>`<th>${c[1]}</th>`).join('')+'</tr>';
    const body=rows.slice(0,8).map(r=>'<tr>'+cols.map(([k])=>{
      let v=r[k];
      if(k==='area'||k==='stand') v=isNum(v)?fmtInt(v):'—';
      else if(k==='cv') v=isNum(v)?f1.format(v*100)+'%':'—';
      else v=(v==null||v==='')?'—':v;
      return `<td>${v}</td>`; }).join('')+'</tr>').join('');
    $('dz-preview').innerHTML = `<div class="pv-t">Prévia — ${fmtInt(rows.length)} linhas detectadas</div><div style="overflow-x:auto"><table class="summary pv">${head}${body}</table></div>`;
  }
  function resetDados(){ staged=null; $('dz-status').style.display='none'; $('dz-actions').style.display='none'; $('dz-preview').innerHTML=''; $('file-in').value=''; }

  function handleFile(file){
    if(!file) return;
    statusBox('info','Lendo <b>'+file.name+'</b>…');
    $('dz-actions').style.display='none'; $('dz-preview').innerHTML='';
    parseWorkbook(file).then(res=>{
      staged=Object.assign({name:file.name}, res);
      let msg=`<b>${fmtInt(res.rows.length)}</b> talhões lidos da aba “<b>${res.sheet}</b>”.`;
      if(res.warnings.length) msg+=`<br><span class="warn-txt">Colunas não localizadas (serão tratadas como “Não Avaliado”): ${res.warnings.join(', ')}.</span>`;
      msg+=`<br>Confira a prévia abaixo e clique em <b>Aplicar ao painel</b>.`;
      statusBox('ok',msg); $('dz-actions').style.display=''; previewTable(res.rows);
    }).catch(err=>{ resetDados(); statusBox('err', err.message); });
  }

  function refreshFilterOptions(){
    coords=[...new Set(DS.map(r=>r.coord))].sort();
    farms =[...new Set(DS.map(r=>r.fazenda))].sort((a,b)=>a.localeCompare(b,'pt'));

    document.querySelectorAll('#f-status .pill').forEach(p=>p.classList.toggle('on', p.dataset.v==='all'));
  }
  function applyData(rows, sourceName){
    DS = rows.slice();
    state = {coord:'all', status:'all', farm:'all'};
    refreshFilterOptions(); syncFarms();
    document.querySelector('#chip-src b').textContent = sourceName;
    updateFooter(); render(); showTab('painel');
  }

  $('file-in').addEventListener('change', e=> handleFile(e.target.files[0]) );
  const dz=$('dz');
  ['dragenter','dragover'].forEach(ev=> dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.add('drag'); }) );
  ['dragleave'].forEach(ev=> dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.remove('drag'); }) );

  $('btn-cancel').addEventListener('click', resetDados);
  $('btn-restore').addEventListener('click', ()=>{ applyData(DATA, 'Relatório_devolução.xlsx'); });

  /* ================= Aba "Talhões" (nível de talhão) ================= */
  const META = 1111;                       // meta de referência de plantio (plantas/ha)
  let tlSort = {key:'fazenda', dir:1}, tlSearch='', tlSelKey=null, tlIndex={};
  const tlKey = r => `${r.coord}|||${r.fazenda}|||${r.tl}`;
  const standOrder = ['Aprovado','Atenção','Multa','Reforma','Não Avaliado'];
  const confOrder  = ['Conforme','Ad. Reforço','Reforma','Não Avaliado'];
  const statusOrder= ['Aprovado','Reprovado','Não Avaliado'];

  function hideDetail(){ $('tl-detail').style.display='none'; $('tl-empty').style.display=''; }
  function renderTalhaoDetail(r){
    $('tl-empty').style.display='none';
    const d=$('tl-detail'); d.style.display='';
    const stc=statusColor[r.aprovacao]||C.neu;
    const standSub = isNum(r.stand)
      ? (()=>{ const df=Math.round(r.stand-META), pc=100*(r.stand-META)/META; return `${df>=0?'+':''}${fmtInt(df)} vs meta 1.111 (${df>=0?'+':''}${f1.format(pc)}%)`; })()

    const cards=[
      {lab:'Área', val:isNum(r.area)?fmtHa(r.area):'—', u:'ha'},
      {lab:'Idade', val:isNum(r.idade)?fmtInt(r.idade):'—', u:'dias', sub:'janela de vistoria 110–120'},
      {lab:'Stand', val:isNum(r.stand)?fmtInt(r.stand):'—', u:'pl/ha', sub:standSub},
      {lab:'CV%', val:isNum(r.cv)?f1.format(r.cv*100):'—', u:'%', sub:isNum(r.cv)?('classe '+r.classe_cv):'sem leitura de campo'},
      {lab:'Classe do stand', tag:[r.classe_stand, standVColor[r.classe_stand]||C.neu]},

    ];
    if(r.plantio){ cards.splice(2,0,{lab:'Plantio', val:String(r.plantio).split('-').reverse().join('/')}); }
    d.innerHTML = `
      <div class="d-head">
        <div class="d-title">${r.fazenda} · Talhão ${r.tl||'—'}

        (c.tag ? `<div style="margin-top:11px"><span class="tag num" style="font-size:12.5px;background:${c.tag[1]}1a;color:${c.tag[1]}">${c.tag[0]}</span></div>`
               : `<div class="val num">${c.val}${c.u?`<span class="u">${c.u}</span>`:''}</div>`)+
        (c.sub?`<div class="sub">${c.sub}</div>`:'')+`</div>`).join('')}</div>`;
    $('d-close').addEventListener('click', ()=>{ tlSelKey=null; hideDetail();
      document.querySelectorAll('#tl-body tr').forEach(x=>x.classList.remove('sel')); });

  function renderTalhoes(){
    let rows = filtered();
    const q = stripAcc(tlSearch);
    if(q) rows = rows.filter(r => stripAcc(`${r.fazenda} ${r.tl} ${r.coord} ${r.aprovacao}`).includes(q));
    const k=tlSort.key, dir=tlSort.dir;
    const val=r=>{ switch(k){
      case 'area':return isNum(r.area)?r.area:null;
      case 'idade':return isNum(r.idade)?r.idade:null;
      case 'stand':return isNum(r.stand)?r.stand:null;
      case 'cv':return isNum(r.cv)?r.cv:null;
      case 'classe_cv':return cvOrder.indexOf(r.classe_cv);
      case 'classe_stand':return standOrder.indexOf(r.classe_stand);
      case 'conf_cv':return confOrder.indexOf(r.conf_cv);
      case 'status':return statusOrder.indexOf(r.aprovacao);
      case 'coord':return r.coord; case 'tl':return r.tl; default:return r.fazenda; } };
    rows.sort((a,b)=>{ let x=val(a),y=val(b);
      const xn=(x==null), yn=(y==null); if(xn&&yn) return 0; if(xn) return 1; if(yn) return -1;
      return (typeof x==='string'? x.localeCompare(y,'pt') : (x-y))*dir; });

    const idadeMed=mean(rows,r=>r.idade);
    $('tl-count').textContent = `${fmtInt(rows.length)} talhõ${rows.length===1?'':'es'}` + (idadeMed!=null? ` · idade média ${Math.round(idadeMed)} dias` : '');
    tlIndex={};
    const tag=(t,c)=>`<span class="tag num" style="background:${c}1a;color:${c}">${t}</span>`;
    $('tl-body').innerHTML = rows.map(r=>{ const key=tlKey(r); tlIndex[key]=r;
      return `<tr data-key="${key.replace(/"/g,'&quot;')}"${key===tlSelKey?' class="sel"':''}>
        <td class="l"><b style="color:${C.pine};font-weight:600">${r.coord.replace('Coordenação ','Coord. ')}</b></td>
        <td class="l">${r.fazenda}</td>
        <td class="l">${r.tl||'—'}</td>
        <td class="num">${isNum(r.area)?fmtHa(r.area):'—'}</td>
        <td class="num">${isNum(r.idade)?fmtInt(r.idade):'—'}</td>
        <td class="num">${isNum(r.stand)?fmtInt(r.stand):'—'}</td>
        <td class="num">${isNum(r.cv)?f1.format(r.cv*100)+'%':'—'}</td>
        <td class="l">${tag(r.classe_cv, cvColors[r.classe_cv]||C.neu)}</td>
        <td class="l">${tag(r.classe_stand, standVColor[r.classe_stand]||C.neu)}</td>
        <td class="l">${tag(r.conf_cv, confColor[r.conf_cv]||C.neu)}</td>
        <td class="l">${tag(r.aprovacao, statusColor[r.aprovacao]||C.neu)}</td>
      </tr>`; }).join('') || `<tr><td colspan="11" style="text-align:center;color:var(--ink-3);padding:22px">Nenhum talhão no recorte atual.</td></tr>`;

    if(tlSelKey && tlIndex[tlSelKey]) renderTalhaoDetail(tlIndex[tlSelKey]);
    else { tlSelKey=null; hideDetail(); }

    document.querySelectorAll('#tl-table th[data-k]').forEach(th=>{
      th.classList.toggle('desc', th.dataset.k===k && dir<0);
      th.classList.toggle('asc',  th.dataset.k===k && dir>0);
    });
  }

  // talhão interactions
  const numericDesc=['area','idade','stand','cv'];
  document.querySelectorAll('#tl-table th[data-k]').forEach(th=>{
    th.addEventListener('click', ()=>{ const k=th.dataset.k;
      if(tlSort.key===k) tlSort.dir*=-1; else tlSort={key:k, dir: numericDesc.includes(k)? -1 : 1};
      renderTalhoes(); });
  });
  $('tl-search').addEventListener('input', e=>{ tlSearch=e.target.value; renderTalhoes(); });
  $('tl-body').addEventListener('click', e=>{ const tr=e.target.closest('tr[data-key]'); if(!tr) return;
    tlSelKey=tr.dataset.key;
    document.querySelectorAll('#tl-body tr').forEach(x=>x.classList.toggle('sel', x.dataset.key===tlSelKey));
    const r=tlIndex[tlSelKey]; if(r){ renderTalhaoDetail(r); $('tl-detail').scrollIntoView({behavior:'smooth', block:'start'}); }
  });

  /* ================= Aba "Visitas" (por talhão) ================= */
  const AGES = [45,90,120];
  const vEsc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const vFmtDate = iso => { if(!iso) return '—'; const p=String(iso).split('-'); return p.length===3? `${p[2]}/${p[1]}/${p[0]}` : String(iso); };
  function addDays(iso,n){ const p=String(iso||'').split('-'); if(p.length!==3) return null; const d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2])); d.setUTCDate(d.getUTCDate()+n); return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`; }
  const talhaoByKey = k => DS.find(r=>tlKey(r)===k) || null;
  const hasData = v => !!(v && (v.data || isNum(v.stand) || isNum(v.cv) || (v.sit&&v.sit!=='') || (v.formiga&&v.formiga!=='') || (v.daninhas&&v.daninhas!=='') || (v.obs&&String(v.obs).trim()!=='') || (v.fotos&&v.fotos.length)));
  function progressOf(key){ const rec=VCACHE[key]; if(!rec||!rec.v) return 0; let n=0; AGES.forEach(a=>{ if(hasData(rec.v[a])) n++; }); return n; }
  function fotosCount(key){ const rec=VCACHE[key]; if(!rec||!rec.v) return 0; let n=0; AGES.forEach(a=>{ const v=rec.v[a]; if(v&&v.fotos) n+=v.fotos.length; }); return n; }

  // ---- IndexedDB store (com degradação suave) ----
  const VDB = (function(){
    const NAME='painel_devolucao_visitas', STORE='talhoes', VER=1, LSK='painel_devolucao_visitas_ls';
    let dbp=null, idbBad=false;
    function lsAll(){ try{ return JSON.parse(localStorage.getItem(LSK)||'{}'); }catch(e){ return {}; } }
    function lsSave(o){ try{ localStorage.setItem(LSK, JSON.stringify(o)); return true; }catch(e){ return false; } }
    function open(){ if(idbBad) return Promise.reject('idb'); if(dbp) return dbp; dbp=new Promise((res,rej)=>{ let req; try{ req=indexedDB.open(NAME,VER); }catch(e){ idbBad=true; return rej(e); }
      req.onupgradeneeded=()=>{ const db=req.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE,{keyPath:'key'}); };
      req.onsuccess=()=>res(req.result); req.onerror=()=>{ idbBad=true; rej(req.error); }; }); return dbp; }
    const tx=mode=> open().then(db=> db.transaction(STORE,mode).objectStore(STORE));
    return {
      get:k=> tx('readonly').then(s=> new Promise((res,rej)=>{ const r=s.get(k); r.onsuccess=()=>res(r.result||null); r.onerror=()=>rej(r.error); })).catch(()=> lsAll()[k]||null),
      all:()=> tx('readonly').then(s=> new Promise((res,rej)=>{ const r=s.getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); })).catch(()=> Object.values(lsAll())),
      put:v=> tx('readwrite').then(s=> new Promise((res,rej)=>{ const r=s.put(v); r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error); })).catch(()=>{ const o=lsAll(); o[v.key]=v; return lsSave(o); }),
      del:k=> tx('readwrite').then(s=> new Promise((res,rej)=>{ const r=s.delete(k); r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error); })).catch(()=>{ const o=lsAll(); delete o[k]; return lsSave(o); }),
      clear:()=> tx('readwrite').then(s=> new Promise((res,rej)=>{ const r=s.clear(); r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error); })).catch(()=> lsSave({})),
    };
  })();

  let VCACHE={}, vSelKey=null, vSearch='', storageOk=true;

  function ensureRec(key){ if(!VCACHE[key]) VCACHE[key]={key, updated:Date.now(), v:{}}; if(!VCACHE[key].v) VCACHE[key].v={}; return VCACHE[key]; }
  function setVisitField(age,f,val){ const rec=ensureRec(vSelKey); rec.v[age]=rec.v[age]||{}; if(val===''||val==null){ delete rec.v[age][f]; } else { rec.v[age][f]=val; } rec.updated=Date.now(); }

  let _saveT=null, _saveKey=null;
  function scheduleSave(key){ _saveKey=key; clearTimeout(_saveT); _saveT=setTimeout(()=>{ doSave(_saveKey).then(()=>markSaved()); }, 450); }
  async function doSave(key){ const rec=VCACHE[key]; if(!rec) return false; AGES.forEach(a=>{ const v=rec.v[a]; if(v && !hasData(v)) delete rec.v[a]; }); return await VDB.put(rec); }
  function markSaved(){ const s=$('vs-save'); if(!s) return; s.textContent='✓ salvo'; s.classList.add('on'); clearTimeout(markSaved._t); markSaved._t=setTimeout(()=>{ s.textContent=''; s.classList.remove('on'); }, 1400); }

  // ---- picker ----
  function renderVisitPicker(){
    const list=$('vs-pick-list'), cnt=$('vs-pick-count'); if(!list) return;
    let base=filtered(); const q=stripAcc(vSearch);
    if(q) base=base.filter(r=>stripAcc(`${r.fazenda} ${r.tl} ${r.coord}`).includes(q));
    base=base.slice().sort((a,b)=> a.fazenda.localeCompare(b.fazenda,'pt') || String(a.tl).localeCompare(String(b.tl),'pt',{numeric:true}));
    const withV=base.filter(r=>progressOf(tlKey(r))>0).length;
    if(cnt) cnt.textContent=`${fmtInt(base.length)} talhõ${base.length===1?'':'es'} · ${fmtInt(withV)} com visitas`;
    const cap=250, show=base.slice(0,cap);
    list.innerHTML = show.map(r=>{ const key=tlKey(r), p=progressOf(key), fc=fotosCount(key);
      const cls=p===0?'none':(p>=AGES.length?'full':'some'); const bl=p===0?'sem visitas':`${p}/${AGES.length}${fc?` · ${fc} 📷`:''}`;
      return `<button class="vs-pick-row${key===vSelKey?' on':''}" data-key="${vEsc(key)}"><div class="r1"><span>${vEsc(r.fazenda)} · TL ${vEsc(r.tl||'—')}</span><span class="vs-badge ${cls}">${bl}</span></div><div class="r2">${vEsc(r.coord.replace('Coordenação ','Coord. '))}${r.plantio?` · plantio ${vFmtDate(r.plantio)}`:''}</div></button>`;
    }).join('') || `<div class="vs-foto-empty" style="padding:10px">Nenhum talhão no recorte atual.</div>`;
    if(base.length>cap) list.innerHTML += `<div class="vs-foto-empty" style="padding:8px 4px">Mostrando ${cap} de ${fmtInt(base.length)}. Refine a busca.</div>`;
  }

  // ---- panel ----
  function renderVisitPanel(){
    const panel=$('vs-panel'); if(!panel) return;
    if(!vSelKey){ panel.innerHTML=`<div class="tl-empty" style="margin:0">Selecione um talhão na lista ao lado para registrar as visitas.</div>`; return; }
    const r=talhaoByKey(vSelKey);
    if(!r){ panel.innerHTML=`<div class="tl-empty" style="margin:0">Talhão não encontrado na base atual.</div>`; return; }
    const rec=VCACHE[vSelKey], p=progressOf(vSelKey), fc=fotosCount(vSelKey), stc=statusColor[r.aprovacao]||C.neu;
    const head=`<div class="vs-phead"><div><div class="t">${vEsc(r.fazenda)} · Talhão ${vEsc(r.tl||'—')}</div>`+
      `<div class="s">${vEsc(r.coord)}${isNum(r.id)?' · ID '+r.id:''}${r.plantio?' · plantio '+vFmtDate(r.plantio):''}</div>`+
      `<div style="margin-top:10px"><span class="tag num" style="font-size:12px;background:${stc}1a;color:${stc}">${r.aprovacao}</span></div></div>`+
      `<div class="vs-prog"><b>${p}/${AGES.length}</b> visitas<br>${fc?`${fc} foto${fc===1?'':'s'}`:'sem fotos'}</div></div>`;
    const situ=['','Conforme','Atenção','Crítico'];
    const sitClr={ 'Conforme':C.pos, 'Atenção':C.warn, 'Crítico':C.neg };
    const sitCss=val=>{ const c=sitClr[val]; return c? `border-color:${c};color:${c};font-weight:600` : ''; };
    const inc=['','Ausente','Baixa','Média','Alta'];
    const stageColor={45:'#6BA986',90:'#3E8E63',120:'#22643F'};
    const ord={45:'1ª',90:'2ª',120:'3ª'};
    const cards=AGES.map(age=>{ const v=(rec&&rec.v&&rec.v[age])||{}; const done=hasData(v); const prev=r.plantio? addDays(r.plantio,age):null;
      return `<div class="vs-visit${done?' done':''}" data-card="${age}" style="--stage:${stageColor[age]||'#3E8E63'}">
        <div class="vs-vh"><div class="vs-stage"><span class="vs-daynum"><b>${age}</b><i>dias</i></span><div class="vt">${ord[age]||''} visita<small>${prev?'previsto '+vFmtDate(prev):'defina a data de plantio'}</small></div></div><span class="vs-chip ${done?'ok':'pend'}">${done?'registrada':'pendente'}</span></div>
        <div class="vs-fields">
          <div class="vs-f"><label>Data da visita</label><input type="date" data-age="${age}" data-f="data" value="${vEsc(v.data||'')}"></div>
          <div class="vs-f"><label>Situação</label><select data-age="${age}" data-f="sit" style="${sitCss(v.sit||'')}">${situ.map(o=>`<option value="${o}"${(v.sit||'')===o?' selected':''}>${o||'Selecione…'}</option>`).join('')}</select></div>
          <div class="vs-f"><label>Stand (pl/ha)</label><input type="number" step="1" inputmode="numeric" data-age="${age}" data-f="stand" value="${isNum(v.stand)?v.stand:''}"></div>
          <div class="vs-f"><label>CV (%)</label><input type="number" step="0.1" inputmode="decimal" data-age="${age}" data-f="cv" value="${isNum(v.cv)?v.cv:''}"></div>
          <div class="vs-f"><label>Formiga</label><select data-age="${age}" data-f="formiga">${inc.map(o=>`<option value="${o}"${(v.formiga||'')===o?' selected':''}>${o||'—'}</option>`).join('')}</select></div>
          <div class="vs-f"><label>Daninhas</label><select data-age="${age}" data-f="daninhas">${inc.map(o=>`<option value="${o}"${(v.daninhas||'')===o?' selected':''}>${o||'—'}</option>`).join('')}</select></div>
          <div class="vs-f full"><label>Observações</label><textarea data-age="${age}" data-f="obs" placeholder="Anotações da visita…">${vEsc(v.obs||'')}</textarea></div>
        </div>
        <div class="vs-fotos">
          <div class="fl"><span>Fotos${v.fotos&&v.fotos.length?` (${v.fotos.length})`:''}</span><label class="vs-addfoto">+ Adicionar fotos<input type="file" accept="image/*" multiple hidden data-age="${age}" data-foto="1"></label></div>
          <div class="vs-foto-grid">${(v.fotos||[]).map(f=>`<div class="vs-foto" title="${vEsc(f.name||'')}"><img src="${f.url}" alt="${vEsc(f.name||'')}"><button class="rm" data-age="${age}" data-rm="${vEsc(f.id)}" title="Remover">×</button></div>`).join('') || '<div class="vs-foto-empty">Nenhuma foto anexada.</div>'}</div>
        </div>
      </div>`;
    }).join('');
    panel.innerHTML = head + `<div class="vs-visits">${cards}</div>`;
  }

  function refreshCardState(age){ const panel=$('vs-panel'); const rec=VCACHE[vSelKey]; const v=(rec&&rec.v&&rec.v[age])||{}; const done=hasData(v);
    const card=panel.querySelector(`.vs-visit[data-card="${age}"]`); if(card){ card.classList.toggle('done',done); const chip=card.querySelector('.vs-chip'); if(chip){ chip.className='vs-chip '+(done?'ok':'pend'); chip.textContent=done?'registrada':'pendente'; } } }
  function refreshProg(){ const panel=$('vs-panel'); const pe=panel.querySelector('.vs-prog'); if(pe){ const p=progressOf(vSelKey), fc=fotosCount(vSelKey); pe.innerHTML=`<b>${p}/${AGES.length}</b> visitas<br>${fc?`${fc} foto${fc===1?'':'s'}`:'sem fotos'}`; } renderVisitPicker(); }

  function onFieldEdit(el){ if(el.dataset.f==null) return; const age=+el.dataset.age, f=el.dataset.f;
    const before=progressOf(vSelKey);
    let val; if(f==='stand'||f==='cv'){ val=el.value===''?null:Number(el.value); if(val!=null&&!isFinite(val)) val=null; } else { val=el.value; }
    setVisitField(age,f,val); refreshCardState(age);
    if(f==='sit'){ const c={ 'Conforme':C.pos,'Atenção':C.warn,'Crítico':C.neg }[val]; el.style.borderColor=c||''; el.style.color=c||''; el.style.fontWeight=c?'600':''; }
    const after=progressOf(vSelKey), pe=$('vs-panel').querySelector('.vs-prog');
    if(pe){ const fc=fotosCount(vSelKey); pe.innerHTML=`<b>${after}/${AGES.length}</b> visitas<br>${fc?`${fc} foto${fc===1?'':'s'}`:'sem fotos'}`; }
    if(after!==before) renderVisitPicker();
    scheduleSave(vSelKey); }

  // ---- fotos ----
  function fileToResized(file, maxDim=1400, q=0.82){ return new Promise((res,rej)=>{ const fr=new FileReader();
    fr.onload=()=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; const scale=Math.min(1, maxDim/Math.max(w,h)); const nw=Math.max(1,Math.round(w*scale)), nh=Math.max(1,Math.round(h*scale));
      const cv=document.createElement('canvas'); cv.width=nw; cv.height=nh; const ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,nw,nh); ctx.drawImage(img,0,0,nw,nh);
      let url; try{ url=cv.toDataURL('image/jpeg', q); }catch(e){ url=fr.result; }
      res({ id:'f'+Date.now().toString(36)+Math.random().toString(36).slice(2,7), name:file.name||'foto.jpg', url }); };
      img.onerror=()=>rej(new Error('img')); img.src=fr.result; };
    fr.onerror=()=>rej(new Error('read')); fr.readAsDataURL(file); }); }

  async function addPhotos(age, files){ if(!files||!files.length) return; const s=$('vs-save'); if(s){ s.textContent='processando fotos…'; s.classList.remove('on'); }
    const rec=ensureRec(vSelKey); rec.v[age]=rec.v[age]||{}; rec.v[age].fotos=rec.v[age].fotos||[];
    const arr=[...files].filter(f=>/^image\//.test(f.type||''));
    for(const f of arr){ try{ const o=await fileToResized(f); rec.v[age].fotos.push(o); }catch(e){} }
    rec.updated=Date.now(); await doSave(vSelKey); renderVisitPanel(); renderVisitPicker(); markSaved(); }
  async function removePhoto(age, fid){ const rec=VCACHE[vSelKey]; if(!rec||!rec.v||!rec.v[age]||!rec.v[age].fotos) return; rec.v[age].fotos=rec.v[age].fotos.filter(f=>f.id!==fid); rec.updated=Date.now(); await doSave(vSelKey); renderVisitPanel(); renderVisitPicker(); markSaved(); }

  function openLightbox(url){ const lb=$('vs-lightbox'); if(!lb) return; $('vs-lightbox-img').src=url; lb.style.display='flex'; }
  function closeLightbox(){ const lb=$('vs-lightbox'); if(!lb) return; lb.style.display='none'; $('vs-lightbox-img').src=''; }

  // ---- export / import / clear ----
  function exportVisits(){ const recs=Object.values(VCACHE).filter(r=>r&&r.v&&Object.keys(r.v).length);
    if(!recs.length){ alert('Ainda não há visitas registradas para exportar.'); return; }
    const payload={ meta:{ app:'painel_devolucao_visitas', versao:1, exportadoEm:new Date().toISOString(), talhoes:recs.length }, dados:recs };
    const blob=new Blob([JSON.stringify(payload)], {type:'application/json'}); const dt=new Date();
    const stamp=`${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`visitas_talhoes_${stamp}.json`; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 600); }
  function importVisits(file){ if(!file) return; const fr=new FileReader();
    fr.onload=async()=>{ try{ const obj=JSON.parse(fr.result); const arr=Array.isArray(obj)?obj:(obj.dados||obj.talhoes||[]);
      if(!Array.isArray(arr)||!arr.length) throw new Error('vazio');
      if(!confirm(`Importar ${arr.length} talhão(ões) com visitas? Registros com a mesma identificação serão substituídos.`)) return;
      let n=0; for(const rec of arr){ if(rec&&rec.key&&rec.v){ VCACHE[rec.key]={ key:rec.key, updated:rec.updated||Date.now(), v:rec.v }; await VDB.put(VCACHE[rec.key]); n++; } }
      renderVisitPicker(); if(vSelKey) renderVisitPanel(); alert(`${n} talhão(ões) importado(s) com sucesso.`);
    }catch(e){ alert('Arquivo inválido para importação de visitas.'); } };
    fr.readAsText(file); }
  function clearVisits(){ if(!confirm('Apagar TODOS os registros de visitas e fotos? Esta ação não pode ser desfeita.')) return; VDB.clear(); VCACHE={}; vSelKey=null; renderVisitPicker(); renderVisitPanel(); markSaved(); }

  // ---- storage probe + hydrate ----
  function showStorageWarn(){ const w=$('vs-warn'); if(!w) return; w.style.display=''; w.innerHTML='⚠ Não foi possível usar o armazenamento local do navegador (comum ao abrir o arquivo direto do disco em alguns navegadores). Suas visitas e fotos ficam apenas nesta sessão — use <b>Exportar visitas</b> para salvar um backup e <b>Importar</b> para recarregar depois.'; }
  async function probeStorage(){ try{ const ok=await VDB.put({key:'__probe__', updated:Date.now(), v:{}}); if(!ok){ storageOk=false; } else { await VDB.del('__probe__'); } }catch(e){ storageOk=false; } if(!storageOk) showStorageWarn(); }
  async function hydrateVisits(){ try{ const arr=await VDB.all(); VCACHE={}; (arr||[]).forEach(o=>{ if(o&&o.key&&o.key!=='__probe__') VCACHE[o.key]=o; }); }catch(e){} renderVisitPicker(); if(vSelKey) renderVisitPanel(); }

  // ---- wiring ----
  (function wireVisits(){
    const search=$('vs-search'); if(search) search.addEventListener('input', e=>{ vSearch=e.target.value; renderVisitPicker(); });
    const list=$('vs-pick-list'); if(list) list.addEventListener('click', e=>{ const b=e.target.closest('.vs-pick-row'); if(!b) return; vSelKey=b.dataset.key; renderVisitPanel(); renderVisitPicker(); });
    const panel=$('vs-panel');
    if(panel){
      panel.addEventListener('input', e=>{ if(e.target.matches('[data-f]')) onFieldEdit(e.target); });
      panel.addEventListener('change', e=>{ if(e.target.matches('select[data-f]')) onFieldEdit(e.target); if(e.target.matches('input[data-foto]')){ const age=+e.target.dataset.age; addPhotos(age, e.target.files); e.target.value=''; } });
      panel.addEventListener('click', e=>{ const rm=e.target.closest('.rm[data-rm]'); if(rm){ e.preventDefault(); e.stopPropagation(); removePhoto(+rm.dataset.age, rm.dataset.rm); return; } const cell=e.target.closest('.vs-foto'); if(cell){ const img=cell.querySelector('img'); if(img) openLightbox(img.src); } });
    }
    const ex=$('vs-export'); if(ex) ex.addEventListener('click', exportVisits);
    const im=$('vs-import'); if(im) im.addEventListener('change', e=>{ importVisits(e.target.files[0]); e.target.value=''; });
    const cl=$('vs-clear'); if(cl) cl.addEventListener('click', clearVisits);
    const lbc=$('vs-lb-close'); if(lbc) lbc.addEventListener('click', closeLightbox);
    const lb=$('vs-lightbox'); if(lb) lb.addEventListener('click', e=>{ if(e.target.id==='vs-lightbox') closeLightbox(); });
    document.addEventListener('keydown', e=>{ const lb=$('vs-lightbox'); if(e.key==='Escape' && lb && lb.style.display!=='none') closeLightbox(); });
  })();
  probeStorage(); hydrateVisits();


  render();
})();
</script>
<script>
if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
</script>
